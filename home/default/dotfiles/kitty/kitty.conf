# ─────────────────────────────────────────────────
#  Kitty — Configuration
#  Colors managed by ~/.config/themes/apply.sh
# ─────────────────────────────────────────────────

include kitty-colors.conf

# ── Font ─────────────────────────────────────────
font_family      FiraCode Nerd Font Mono
bold_font        FiraCode Nerd Font Mono Bold
italic_font      FiraCode Nerd Font Mono Light
bold_italic_font FiraCode Nerd Font Mono SemBold
font_size        11.0

# FiraCode ligatures
font_features FiraCodeNFM-Reg +calt +cv14 +cv25 +cv26 +cv32 +ss01 +ss05 +ss07

# ── Window ────────────────────────────────────────
background_opacity 0.90
background_blur    64

window_padding_width   10

# Rounded feel (rendered by compositor)
confirm_os_window_close 0

# ── Cursor ────────────────────────────────────────
cursor_shape     block
cursor_blink_interval 0

# ── Tab bar ───────────────────────────────────────
tab_bar_style                separator
tab_separator                "  "
active_tab_font_style        bold
inactive_tab_font_style      normal
tab_bar_margin_height        4 4
tab_title_template           " {title} "

# ── Bell ─────────────────────────────────────────
enable_audio_bell  no
visual_bell_duration 0.15
bell_on_tab        yes

# ── Scrollback ────────────────────────────────────
scrollback_lines    10000

# ── Performance ───────────────────────────────────
repaint_delay  8
input_delay    2
sync_to_monitor yes

# ── Misc ─────────────────────────────────────────
shell_integration  enabled
allow_remote_control yes
listen_on unix:/tmp/kitty

# ── Font size — Ctrl+scroll ───────────────────────
map ctrl+wheel_up   change_font_size all +1.0
map ctrl+wheel_down change_font_size all -1.0
